<app-header></app-header>

<!-- ✅ Patient Table -->
<div class="table-wrapper">
  <table mat-table [dataSource]="patients" class="mat-elevation-z8">

    <!-- Name -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Name </th>
      <td mat-cell *matCellDef="let patient"> {{ patient?.name }} </td>
    </ng-container>

    <!-- CR Number -->
    <ng-container matColumnDef="crNumber">
      <th mat-header-cell *matHeaderCellDef> CR Number </th>
      <td mat-cell *matCellDef="let patient"> {{ patient?.crNumber }} </td>
    </ng-container>

    <!-- Gender -->
    <ng-container matColumnDef="gender">
      <th mat-header-cell *matHeaderCellDef> Gender </th>
      <td mat-cell *matCellDef="let patient"> {{ patient?.gender }} </td>
    </ng-container>

    <!-- Age -->
    <ng-container matColumnDef="age">
      <th mat-header-cell *matHeaderCellDef> Age </th>
      <td mat-cell *matCellDef="let patient"> {{ patient?.age }} </td>
    </ng-container>

    <!-- Visit Date -->
    <ng-container matColumnDef="visitDate">
      <th mat-header-cell *matHeaderCellDef> Visit Date </th>
      <td mat-cell *matCellDef="let patient">
        {{ patient?.createdAt | date : "dd/MM/yyyy" }}
      </td>
    </ng-container>

    <!-- Visit Time -->
    <ng-container matColumnDef="visitTime">
      <th mat-header-cell *matHeaderCellDef> Visit Time </th>
      <td mat-cell *matCellDef="let patient">
        {{ patient?.createdAt | date : "hh:mm:ss a" }}
      </td>
    </ng-container>

    <!-- ✅ Yahi missing tha -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
