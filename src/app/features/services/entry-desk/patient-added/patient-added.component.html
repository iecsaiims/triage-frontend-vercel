<app-header></app-header>

<form [formGroup]="patientForm" (ngSubmit)="onSubmit()" class="patient-form">
  <h2>Patient Registration</h2>

  <div class="form-grid">
    <!-- Patient Name -->
    <mat-form-field appearance="outline">
      <mat-label>Patient Name</mat-label>
      <input matInput formControlName="name" />
      <mat-error *ngIf="patientForm.get('name')?.hasError('required')"
        >Patient Name is required</mat-error
      >
    </mat-form-field>

    <!-- CR Number -->
    <mat-form-field appearance="outline">
      <mat-label>CR Number</mat-label>
      <input matInput formControlName="crNumber" />
      <mat-error *ngIf="patientForm.get('crNumber')?.hasError('required')"
        >CR Number is required</mat-error
      >
    </mat-form-field>

     <mat-form-field appearance="outline">
      <mat-label>Address</mat-label>
      <input matInput formControlName="address" />
      <mat-error *ngIf="patientForm.get('address')?.hasError('required')"
        >Address is required</mat-error
      >
    </mat-form-field>
    <!-- Gender -->
    <mat-form-field appearance="outline">
      <mat-label>Gender</mat-label>
      <mat-select formControlName="gender">
        <mat-option value="Male">Male</mat-option>
        <mat-option value="Female">Female</mat-option>
        <mat-option value="Other">Other</mat-option>
      </mat-select>
      <mat-error *ngIf="patientForm.get('gender')?.hasError('required')"
        >Gender is required</mat-error
      >
    </mat-form-field>

    <!-- Age -->
    <mat-form-field appearance="outline">
      <mat-label>Age</mat-label>
      <input matInput type="number" formControlName="age" />
      <mat-error *ngIf="patientForm.get('age')?.hasError('required')"
        >Age is required</mat-error
      >
    </mat-form-field>

    <!-- Guardian Type (Radio Buttons) -->
    <div class="form-radio">
      <label class="mat-label">Guardian Type</label>
      <mat-radio-group formControlName="guardianType" class="radio-group">
        <mat-radio-button value="Father">Father</mat-radio-button>
        <mat-radio-button value="Husband">Husband</mat-radio-button>
      </mat-radio-group>
    </div>

    <!-- Guardian Name -->
    <mat-form-field appearance="outline">
      <mat-label>Guardian Name</mat-label>
      <input matInput formControlName="guardianName" />
      <mat-error *ngIf="patientForm.get('guardianName')?.hasError('required')"
        >Guardian Name is required</mat-error
      >
    </mat-form-field>
  </div>

  <!-- Success/Error Message -->
  <div *ngIf="successMessage" class="message-box">
    <span class="success-message">{{ successMessage }}</span>
  </div>

  <!-- Submit Button -->
  <button
    mat-raised-button
    color="primary"
    type="submit"
    [disabled]="isSubmitting"
  >
    {{ isSubmitting ? "Submitting..." : "Submit" }}
  </button>
</form>
